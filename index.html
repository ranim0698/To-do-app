<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
</head>
<body>
    <h1>My Task Manager</h1>
    <div class="input-section">
        <input type="text" id="taskInput" placeholder="What needs to be done?">
        <select id="priorityInput">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
        </select>
        <button id="addBtn">Add Task</button>
    </div>
    <div class="dashboard-grid">
        <div class="card card-total">
            <h3>Total Tasks</h3>
            <div class="number" id="totalCounter">0</div>
            <button class="card-clear-btn" id="clearAllBtn">Clear All</button>
        </div>
        <div class="card card-active">
            <h3>Active</h3>
            <div class="number" id="activeCounter">0</div>
            <button class="card-clear-btn" id="clearActiveBtn">Clear Active</button>
        </div>
        <div class="card card-completed">
            <h3>Completed</h3>
            <div class="number" id="completedCounter">0</div>
             <button class="card-clear-btn" id="clearCompletedBtn">Clear Done</button>
        </div>
    </div>
    <ul id="taskList"></ul>
    <scrpt src="script.js"></scrpt>
</body>
</html>
